<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Базовые мета-теги -->
    <meta
      name="description"
      content="Портфолио Константина Анненкова — Frontend Developer. Примеры работ: Web-ларёк, Stellar Burger, Speech Yandex-API Service, Оно тебе надо."
    />
    <meta name="author" content="Константин Анненков" />
    <title>Константин Анненков — Портфолио</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pheb.ru/portfolio.html" />
    <meta property="og:title" content="Портфолио — Константин Анненков" />
    <meta
      property="og:description"
      content="Мои проекты: SPA-магазины на TypeScript, React-приложения, веб-сервисы на PHP с интеграцией внешних API. Pixel-perfect вёрстка и чистая архитектура."
    />
    <meta
      property="og:image"
      content="https://pheb.ru/assets/img/og-image.jpg"
    />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="Константин Анненков" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://pheb.ru/portfolio.html" />
    <meta name="twitter:title" content="Портфолио — Константин Анненков" />
    <meta
      name="twitter:description"
      content="Мои проекты: SPA-магазины на TypeScript, React-приложения, веб-сервисы на PHP с интеграцией внешних API."
    />
    <meta
      name="twitter:image"
      content="https://pheb.ru/assets/img/og-image.jpg"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <!-- Preload основных шрифтов -->
    <link
      rel="preload"
      as="font"
      href="assets/fonts/Inter-VariableFont-opsz-wght.ttf"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      href="assets/fonts/Montserrat-VariableFont-wght.ttf"
      type="font/ttf"
      crossorigin
    />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome icons -->
    <script
      src="https://use.fontawesome.com/releases/v6.3.0/js/all.js"
      crossorigin="anonymous"
    ></script>

    <!-- Core theme CSS -->
    <link href="css/styles.css" rel="stylesheet" />
  </head>

  <body id="page-top">
    <!-- Navigation -->
    <nav
      id="mainNav"
      class="navbar navbar-expand-lg bg-secondary text-uppercase fixed-top"
    >
      <div class="container">
        <div class="nav-logo nav-logo-portfolio">
          <a href="index.html" class="logo-link">
            <svg class="logo" aria-hidden="true">
              <use href="svg/sprite.svg#logo"></use>
            </svg>
            <span class="sr-only">На главную</span>
          </a>
          <span class="navbar-brand">Портфолио</span>
        </div>
        <button
          class="navbar-toggler text-uppercase font-weight-bold bg-primary text-white rounded"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarResponsive"
          aria-controls="navbarResponsive"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          Меню
          <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item mx-0 mx-lg-1">
              <a class="nav-link py-3 px-0 px-lg-3 rounded" href="index.html"
                >На главную</a
              >
            </li>
            <li class="nav-item mx-0 mx-lg-1">
              <a class="nav-link py-3 px-0 px-lg-3 rounded" href="about.html"
                >Обо мне</a
              >
            </li>
            <li class="nav-item mx-0 mx-lg-1">
              <a class="nav-link py-3 px-0 px-lg-3 rounded" href="contact.html"
                >Контакты</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Portfolio Section -->
    <section class="page-section_3 portfolio" id="portfolio">
      <div class="container">
        <div class="subheading-divider">
          <!-- Portfolio Section Heading с анимацией -->
          <h2
            class="page-section-heading page-section-heading-portfolio text-center text-uppercase"
          >
            <span class="letter">П</span><span class="letter">о</span
            ><span class="letter">р</span><span class="letter">т</span
            ><span class="letter">ф</span><span class="letter">о</span
            ><span class="letter">л</span><span class="letter">и</span
            ><span class="letter">о</span>
          </h2>

          <!-- Icon Divider -->
          <div class="divider-custom">
            <div class="divider-custom-line"></div>
            <div class="divider-custom-icon">
              <i class="fa-solid fa-laptop"></i>
            </div>
            <div class="divider-custom-line"></div>
          </div>
        </div>
        <!-- Portfolio Grid Items — сюда JS отрендерит карточки -->
        <div class="row justify-content-center" id="portfolioGrid"></div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="theFooter">
      <div class="py-4 text-center text-white">
        <div class="container">
          <div class="nav-logo">
            <a href="index.html" class="logo-link">
              <svg class="logo footer-logo">
                <use href="svg/sprite.svg#logo"></use>
              </svg>
              <span class="sr-only">На главную</span>
            </a>
            <div class="text-white">
              <small class="address-text">&copy; Анненков 2026</small>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <!-- Шаблон карточки портфолио -->
    <template id="portfolioCardTemplate">
      <div class="col-md-6 col-lg-4 mb-5">
        <div class="portfolio-item mx-auto" data-portfolio-id>
          <div
            class="portfolio-item-caption d-flex align-items-center justify-content-center h-100 w-100"
          >
            <div class="portfolio-item-caption-content text-center text-white">
              <i class="fas fa-plus fa-3x"></i>
            </div>
          </div>
          <img class="img-fluid" src="" alt="" />
        </div>
      </div>
    </template>

    <!-- Шаблон модального окна проекта -->
    <template id="portfolioModalTemplate">
      <div class="portfolio-modal modal fade" tabindex="-1">
        <div class="modal-dialog modal-xl">
          <div class="modal-content">
            <div class="modal-header border-0">
              <button
                class="btn-close"
                type="button"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body text-center pb-5">
              <div class="container">
                <div class="row justify-content-center">
                  <div class="col-lg-8">
                    <div class="subheading-divider">
                      <h2
                        class="portfolio-modal-title text-secondary text-uppercase mb-0"
                        data-modal-title
                      ></h2>

                      <div class="divider-custom">
                        <div class="divider-custom-line"></div>
                        <div class="divider-custom-icon" data-modal-icon></div>
                        <div class="divider-custom-line"></div>
                      </div>
                    </div>

                    <img
                      class="img-fluid rounded mb-5"
                      src=""
                      alt=""
                      data-modal-image
                    />

                    <p class="mb-4" data-modal-description></p>
                    <p class="mb-4" data-modal-technologies></p>
                    <p>
                      <a
                        href=""
                        target="_blank"
                        rel="noopener noreferrer"
                        data-modal-link
                        >Перейти на GitHub</a
                      >
                    </p>
                    <p>
                      <a
                        href=""
                        target="_blank"
                        rel="noopener noreferrer"
                        data-modal-url
                        >Перейти на сайт</a
                      >
                    </p>

                    <button
                      class="btn btn-primary mt-2"
                      data-bs-dismiss="modal"
                    >
                      <i class="fas fa-xmark fa-fw"></i>
                      Закрыть
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ============================================
         JS ФАЙЛЫ
         ============================================ -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery (нужен для tilt-эффекта) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>

    <!-- Tilt-эффект для фото -->
    <script src="js/tilt.jquery.min.js"></script>

    <!-- Start Bootstrap scripts (navbar shrink, scrollspy) -->
    <script type="module" src="js/scripts.js"></script>

    <!-- Кастомные скрипты -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
